version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        # Writes to stdio / in-memory buffers; errors are not actionable.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        # Deferred cleanup; rows.Err() / the failing open carry the
        # actionable error.
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
